<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Whalexy is the AI-powered WhatsApp CRM for Indian businesses." />
    <meta name="theme-color" content="#071713" />
    <title>Whalexy — AI WhatsApp CRM</title>
    <script>
      (() => {
        const redirect = sessionStorage.getItem('whalexy:redirect')
        if (!redirect) return
        sessionStorage.removeItem('whalexy:redirect')
        const target = new URL(redirect)
        history.replaceState(null, '', `${target.pathname}${target.search}${target.hash}`)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
